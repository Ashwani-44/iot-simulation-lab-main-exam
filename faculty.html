<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Faculty Dashboard — IoT Lab</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<style>
:root{
  --bg:#eef2f7;--panel:#fff;--border:#d0d8e4;
  --accent:#1a237e;--accent2:#1565c0;
  --green:#2e7d32;--red:#c62828;--warn:#e65100;
  --text:#1a2332;--muted:#607080;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;font-family:'Rajdhani',sans-serif;background:var(--bg);color:var(--text)}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#a0b0c0;border-radius:3px}

/* LOGIN */
#loginWrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0a1060,#1565c0,#006064)}
.lcard{background:#fff;border-radius:16px;padding:40px 46px;width:400px;max-width:92vw;box-shadow:0 24px 60px rgba(0,0,0,.4);text-align:center}
.lcard h1{font-size:22px;font-weight:700;color:var(--accent);margin:10px 0 4px}
.lcard p{font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-bottom:24px}
.lcard label{display:block;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:5px;text-align:left}
.lcard input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:'Rajdhani',sans-serif;background:#f7f9fc;color:var(--text);margin-bottom:14px}
.lcard input:focus{outline:none;border-color:var(--accent2)}
.lerr{background:#ffebee;border:1px solid #ffcdd2;border-radius:7px;padding:8px 13px;color:#c62828;font-size:12px;margin-bottom:12px;display:none;text-align:left}
.lbtn{width:100%;padding:12px;background:linear-gradient(135deg,#1a237e,#1565c0);border:none;border-radius:9px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:'Rajdhani',sans-serif}
.lbtn:hover{filter:brightness(1.1)}
.back-link{margin-top:14px;font-size:12px;color:var(--muted)}
.back-link a{color:var(--accent2);font-weight:700;text-decoration:none}

/* DASHBOARD */
#dashWrap{display:none;min-height:100vh;flex-direction:column}

/* Topbar */
.topbar{background:#1a237e;height:52px;display:flex;align-items:center;padding:0 20px;gap:14px;box-shadow:0 2px 8px rgba(0,0,0,.3);flex-shrink:0}
.tb-brand{font-size:16px;font-weight:700;color:#fff;letter-spacing:.3px;margin-right:8px}
.tb-badge{font-size:11px;font-family:'JetBrains Mono',monospace;padding:3px 8px;border-radius:4px;background:rgba(255,255,255,.12);color:rgba(255,255,255,.8)}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.tb-refresh{padding:5px 12px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);border-radius:5px;color:#fff;font-size:12px;cursor:pointer;font-family:'JetBrains Mono',monospace}
.tb-refresh:hover{background:rgba(255,255,255,.22)}
.tb-logout{padding:5px 12px;background:#c62828;border:none;border-radius:5px;color:#fff;font-size:12px;cursor:pointer;font-family:'JetBrains Mono',monospace}

/* Stats */
.stats-row{display:flex;gap:14px;padding:18px 20px 0}
.stat-card{flex:1;background:var(--panel);border-radius:10px;padding:16px 20px;border:1.5px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,.06);text-align:center}
.stat-num{font-size:32px;font-weight:700;font-family:'JetBrains Mono',monospace}
.stat-lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;font-family:'JetBrains Mono',monospace;margin-top:2px}
.s-total .stat-num{color:var(--accent2)}
.s-active .stat-num{color:var(--green)}
.s-blocked .stat-num{color:var(--red)}
.s-submit .stat-num{color:#7b1fa2}

/* Main content */
.main-content{display:flex;flex:1;gap:16px;padding:16px 20px;overflow:hidden;min-height:0}

/* Student list */
.list-panel{width:340px;background:var(--panel);border-radius:12px;border:1.5px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.06);overflow:hidden}
.list-top{padding:12px 14px;border-bottom:1px solid var(--border)}
.search-box{width:100%;padding:7px 11px;border:1.5px solid var(--border);border-radius:7px;font-size:12px;font-family:'JetBrains Mono',monospace;background:#f7f9fc;margin-bottom:8px}
.search-box:focus{outline:none;border-color:var(--accent2)}
.filter-btns{display:flex;gap:4px}
.fbtn{flex:1;padding:4px 6px;border:1.5px solid var(--border);border-radius:5px;background:none;color:var(--muted);font-size:10px;cursor:pointer;font-family:'JetBrains Mono',monospace;text-align:center}
.fbtn:hover,.fbtn.on{background:#e3f2fd;border-color:#90caf9;color:var(--accent2);font-weight:700}
.fbtn.blocked-f.on{background:#ffebee;border-color:#ffcdd2;color:var(--red)}
.fbtn.submit-f.on{background:#f3e5f5;border-color:#ce93d8;color:#7b1fa2}
.list-items{flex:1;overflow-y:auto;padding:6px}
.stu-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;border:1.5px solid transparent;cursor:pointer;margin-bottom:3px;background:#f7f9fc;transition:all .1s}
.stu-item:hover{border-color:#90caf9;background:#e8f4fd}
.stu-item.sel{border-color:var(--accent2);background:#e3f2fd}
.stu-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
.av-active{background:#e8f5e9;color:var(--green)}
.av-blocked{background:#ffebee;color:var(--red)}
.av-submit{background:#f3e5f5;color:#7b1fa2}
.av-idle{background:#e8edf2;color:var(--muted)}
.stu-info{flex:1;overflow:hidden}
.stu-name{font-size:13px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.stu-roll{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace}
.stu-badge{font-size:9px;padding:2px 6px;border-radius:10px;white-space:nowrap;font-weight:700}
.badge-active{background:#e8f5e9;color:var(--green)}
.badge-blocked{background:#ffebee;color:var(--red)}
.badge-submit{background:#f3e5f5;color:#7b1fa2}
.badge-idle{background:#e8edf2;color:var(--muted)}
.empty-list{padding:32px;text-align:center;color:var(--muted);font-size:13px}

/* Detail panel */
.detail-panel{flex:1;background:var(--panel);border-radius:12px;border:1.5px solid var(--border);display:flex;flex-direction:column;box-shadow:0 2px 8px rgba(0,0,0,.06);overflow:hidden}
.detail-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);gap:8px}
.detail-empty .dei{font-size:48px}
.detail-content{flex:1;overflow-y:auto;padding:20px}
.detail-header{display:flex;align-items:center;gap:14px;margin-bottom:18px}
.dh-avatar{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700}
.dh-info h2{font-size:20px;font-weight:700}
.dh-info p{font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace}
.detail-actions{display:flex;gap:8px;margin-bottom:18px}
.dact-btn{padding:7px 16px;border-radius:7px;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:'Rajdhani',sans-serif}
.dact-unblock{background:#e8f5e9;color:var(--green);border:1.5px solid #a5d6a7}
.dact-unblock:hover{background:var(--green);color:#fff}
.dact-block{background:#ffebee;color:var(--red);border:1.5px solid #ffcdd2}
.dact-block:hover{background:var(--red);color:#fff}
.dact-export{background:#e3f2fd;color:var(--accent2);border:1.5px solid #90caf9}
.dact-export:hover{background:var(--accent2);color:#fff}

/* Info grid */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.info-box{background:#f7f9fc;border:1.5px solid var(--border);border-radius:8px;padding:12px 14px}
.info-box .ib-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;font-family:'JetBrains Mono',monospace;margin-bottom:4px}
.info-box .ib-val{font-size:15px;font-weight:700;color:var(--text)}

/* Section */
.section{margin-bottom:18px}
.section-title{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;font-family:'JetBrains Mono',monospace;margin-bottom:8px;display:flex;align-items:center;gap:6px}

/* Violation log */
.vlog-list{background:#1a0a0a;border-radius:8px;padding:10px;max-height:150px;overflow-y:auto}
.vlog-row{font-size:11px;color:#cc8888;font-family:'JetBrains Mono',monospace;padding:2px 0;border-bottom:1px solid rgba(255,255,255,.04)}

/* Components */
.comp-tags{display:flex;flex-wrap:wrap;gap:5px}
.ctag{background:#e3f2fd;border:1px solid #90caf9;color:var(--accent2);border-radius:12px;padding:3px 10px;font-size:11px;font-weight:600}

/* Connection list */
.wire-list{background:#f0f7ff;border:1.5px solid #b3d4f5;border-radius:8px;padding:8px;max-height:120px;overflow-y:auto}
.wire-row{display:flex;align-items:center;gap:6px;padding:3px 0;font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;border-bottom:1px solid rgba(0,0,0,.05)}
.wr-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* Code viewer */
.code-view{background:#1e1e2e;border-radius:8px;padding:10px 14px;max-height:200px;overflow-y:auto;font-family:'JetBrains Mono',monospace;font-size:11px;color:#cdd6f4;line-height:1.65;white-space:pre}

/* Last seen / live indicator */
.live-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-family:'JetBrains Mono',monospace;padding:2px 7px;border-radius:10px}
.live-badge.active{background:#e8f5e9;color:var(--green)}
.live-badge.blocked{background:#ffebee;color:var(--red)}
.live-badge.submit{background:#f3e5f5;color:#7b1fa2}
.live-badge.idle{background:#e8edf2;color:var(--muted)}
.live-dot{width:6px;height:6px;border-radius:50%;animation:blink .8s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* Reset panel */
.reset-panel{background:#fff3e0;border:1.5px solid #ffcc80;border-radius:10px;padding:14px;margin-bottom:18px}
.reset-panel h3{font-size:13px;color:#e65100;margin-bottom:8px}
.reset-row{display:flex;gap:8px;align-items:center}
.reset-input{flex:1;padding:7px 10px;border:1.5px solid #ffcc80;border-radius:6px;font-size:13px;font-family:'JetBrains Mono',monospace;background:#fff8e1}
.reset-btn{padding:7px 14px;background:#e65100;color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Rajdhani',sans-serif}
.reset-btn:hover{background:#bf360c}

/* Toast */
.toast{position:fixed;bottom:20px;right:20px;background:#1a237e;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;font-family:'Rajdhani',sans-serif;box-shadow:0 4px 14px rgba(0,0,0,.25);z-index:9999;display:none;animation:slidein .2s ease}
@keyframes slidein{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
</style>
</head>
<body>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- ══ LOGIN ══ -->
<div id="loginWrap">
  <div class="lcard">
    <div style="font-size:48px">👨‍🏫</div>
    <h1>Faculty Dashboard</h1>
    <p>// IoT Lab Proctoring System</p>
    <label>Faculty Password</label>
    <input type="password" id="fpass" placeholder="Faculty password daalen" onkeydown="if(event.key==='Enter')doLogin()"/>
    <div class="lerr" id="lerr"></div>
    <button class="lbtn" onclick="doLogin()">🔓 Dashboard Open Karein</button>
    <div class="back-link" style="margin-top:12px"><a href="index.html">← Student Lab</a></div>
  </div>
</div>

<!-- ══ DASHBOARD ══ -->
<div id="dashWrap">
  <!-- Topbar -->
  <div class="topbar">
    <div class="tb-brand">⚡ IoT Lab — Faculty Dashboard</div>
    <div class="tb-badge" id="lastRefresh">—</div>
    <div class="tb-right">
      <button class="tb-refresh" onclick="loadData()">🔄 Refresh</button>
      <button class="tb-logout" onclick="location.reload()">Logout</button>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card s-total"><div class="stat-num" id="sTot">0</div><div class="stat-lbl">Total Students</div></div>
    <div class="stat-card s-active"><div class="stat-num" id="sAct">0</div><div class="stat-lbl">Active</div></div>
    <div class="stat-card s-blocked"><div class="stat-num" id="sBlk">0</div><div class="stat-lbl">Blocked</div></div>
    <div class="stat-card s-submit"><div class="stat-num" id="sSub">0</div><div class="stat-lbl">Submitted</div></div>
  </div>

  <!-- Reset by roll no panel -->
  <div style="padding:12px 20px 0">
    <div class="reset-panel">
      <h3>🔓 Roll No se Block Remove Karein</h3>
      <div class="reset-row">
        <input class="reset-input" id="resetRoll" placeholder="Roll No daalen (e.g. CS2024-001)"/>
        <button class="reset-btn" onclick="resetByRoll()">Unblock Karein</button>
      </div>
    </div>
  </div>

  <!-- Main area -->
  <div class="main-content">
    <!-- Student list -->
    <div class="list-panel">
      <div class="list-top">
        <input class="search-box" placeholder="🔍 Naam ya Roll No..." oninput="filterList(this.value)"/>
        <div class="filter-btns">
          <button class="fbtn on" onclick="setFilter('all',this)">All</button>
          <button class="fbtn" onclick="setFilter('active',this)">Active</button>
          <button class="fbtn blocked-f" onclick="setFilter('blocked',this)">Blocked</button>
          <button class="fbtn submit-f" onclick="setFilter('submitted',this)">Submitted</button>
        </div>
      </div>
      <div class="list-items" id="stuList"></div>
    </div>

    <!-- Detail panel -->
    <div class="detail-panel" id="detailPanel">
      <div class="detail-empty" id="detailEmpty">
        <div class="dei">👆</div>
        <div style="font-size:14px;font-weight:600">Kisi student pe click karein</div>
        <div style="font-size:12px">Detail dekhne ke liye</div>
      </div>
      <div class="detail-content" id="detailContent" style="display:none"></div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
// TEACHER CONFIG — Index.html ke saath match karein
// ═══════════════════════════════════════════
const FAC_PASS   = "faculty123";  // Faculty password
const EXAM_PASS  = "iot2024";     // Student exam password
const BLOCK_KEY  = 'iot_perm_blocked_v2';
const SESSION_KEY = 'iot_sessions_v2';
const SUBMIT_KEY  = 'iot_submissions_v2';

// ═══════════════════════════════════════════
// FIREBASE CONFIG — Real-time cross-device sync
// ═══════════════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyBXLF3azBUgFBLbq2Te1KqahsSws8N8c68",
  authDomain: "iot-simulation-lab-main-exam.firebaseapp.com",
  databaseURL: "https://iot-simulation-lab-main-exam-default-rtdb.firebaseio.com",
  projectId: "iot-simulation-lab-main-exam",
  storageBucket: "iot-simulation-lab-main-exam.firebasestorage.app",
  messagingSenderId: "673660436536",
  appId: "1:673660436536:web:3471643cb3d749164366cd"
};

let db = null;
try {
  firebase.initializeApp(firebaseConfig);
  db = firebase.database();
} catch(e) { console.log('Firebase error:', e); }

// ═══════════════════════════════════════════
// localStorage helpers
// ═══════════════════════════════════════════
function getBlocked(){
  try{return JSON.parse(localStorage.getItem(BLOCK_KEY)||'{}');}catch{return{};}
}
function getSessions(){
  try{return JSON.parse(localStorage.getItem(SESSION_KEY)||'{}');}catch{return{};}
}
function getSubmissions(){
  try{return JSON.parse(localStorage.getItem(SUBMIT_KEY)||'{}');}catch{return{};}
}
function removeBlock(roll){
  const list=getBlocked();
  delete list[roll.trim().toUpperCase()];
  localStorage.setItem(BLOCK_KEY,JSON.stringify(list));
}

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let allStudents=[], selRoll=null, filterMode='all', searchQ='';

// ═══════════════════════════════════════════
// LOGIN
// ═══════════════════════════════════════════
function doLogin(){
  const p=document.getElementById('fpass').value.trim();
  if(p===FAC_PASS){
    document.getElementById('loginWrap').style.display='none';
    document.getElementById('dashWrap').style.display='flex';
    document.getElementById('dashWrap').style.flexDirection='column';
    loadData();
    setInterval(loadData,5000); // auto refresh every 5s
  } else {
    const err=document.getElementById('lerr');
    err.textContent='❌ Wrong faculty password!';
    err.style.display='block';
  }
}

// ═══════════════════════════════════════════
// LOAD DATA FROM LOCALSTORAGE
// ═══════════════════════════════════════════
function loadData(){
  // Load from localStorage (same device)
  const blocked   = getBlocked();
  const sessions  = getSessions();
  const submitted = getSubmissions();
  const map = {};

  // Blocked
  Object.entries(blocked).forEach(([roll,info])=>{
    map[roll]={roll,name:info.name||roll,status:'blocked',vlog:info.vlog||[],blockTime:info.time,violations:3,components:[],wires:[],code:'',loginTime:''};
  });
  // Sessions
  Object.entries(sessions).forEach(([roll,info])=>{
    if(!map[roll]) map[roll]={roll,name:info.name||roll,status:'active',vlog:info.vlog||[],violations:info.violations||0,components:info.components||[],wires:info.wires||[],code:info.code||'',loginTime:info.loginTime||''};
    else { map[roll].components=info.components||[]; map[roll].wires=info.wires||[]; map[roll].code=info.code||''; }
  });
  // Submitted
  Object.entries(submitted).forEach(([roll,info])=>{
    if(map[roll]){if(map[roll].status!=='blocked')map[roll].status='submitted';map[roll].components=info.components||map[roll].components;map[roll].wires=info.wires||map[roll].wires;map[roll].code=info.code||map[roll].code;map[roll].submitTime=info.submitTime;}
    else map[roll]={roll,name:info.name||roll,status:'submitted',vlog:info.vlog||[],violations:info.violations||0,components:info.components||[],wires:info.wires||[],code:info.code||'',loginTime:'',submitTime:info.submitTime};
  });

  // Merge Firebase data (other students' laptops)
  if(db) {
    // Read sessions from Firebase
    db.ref('sessions').once('value', snap => {
      if(snap.val()) {
        Object.entries(snap.val()).forEach(([sid, sdata]) => {
          // sid is roll_timestamp, extract roll
          const roll = sdata.roll ? sdata.roll.trim().toUpperCase() : null;
          if(!roll) return;
          if(!map[roll]) {
            map[roll] = {roll, name:sdata.name||roll, status:'active', vlog:[], violations:0, components:[], wires:[], code:'', loginTime:sdata.startTime||''};
          }
          // Merge violation data
          if(sdata.violation) {
            const vEntries = Object.values(sdata.violation||{});
            map[roll].violations = Math.max(map[roll].violations, vEntries.length);
            map[roll].vlog = vEntries.map(v=>v.msg||'');
          }
          if(sdata.state) {
            map[roll].components = map[roll].components.length ? map[roll].components : [];
          }
        });
      }
      // Read blocked from Firebase
      db.ref('blocked').once('value', bsnap => {
        if(bsnap.val()) {
          Object.values(bsnap.val()).forEach(bdata => {
            const roll = bdata.roll ? bdata.roll.trim().toUpperCase() : null;
            if(!roll) return;
            map[roll] = {...(map[roll]||{}), roll, name:bdata.name||roll, status:'blocked', violations:3, vlog:bdata.vlog||[], blockTime:bdata.time};
          });
        }
        // Read submissions from Firebase
        db.ref('submissions').once('value', ssnap => {
          if(ssnap.val()) {
            Object.values(ssnap.val()).forEach(sub => {
              const roll = sub.roll ? sub.roll.trim().toUpperCase() : null;
              if(!roll) return;
              if(!map[roll]) map[roll]={roll,name:sub.name||roll,status:'submitted',vlog:[],violations:0,components:[],wires:[],code:'',loginTime:''};
              if(map[roll].status!=='blocked') map[roll].status='submitted';
              map[roll].code = sub.code||map[roll].code;
              map[roll].components = sub.components||map[roll].components;
              map[roll].wires = sub.wires||map[roll].wires;
              map[roll].submitTime = sub.time||sub.submitTime;
            });
          }
          // Final render
          finalRender(map);
        });
      });
    });
  } else {
    finalRender(map);
  }
}

function finalRender(map) {
  allStudents = Object.values(map);
  const tot=allStudents.length;
  const act=allStudents.filter(s=>s.status==='active').length;
  const blk=allStudents.filter(s=>s.status==='blocked').length;
  const sub=allStudents.filter(s=>s.status==='submitted').length;
  document.getElementById('sTot').textContent=tot;
  document.getElementById('sAct').textContent=act;
  document.getElementById('sBlk').textContent=blk;
  document.getElementById('sSub').textContent=sub;
  document.getElementById('lastRefresh').textContent='Last: '+new Date().toLocaleTimeString();
  renderList();
  if(selRoll) showDetail(selRoll);
}

// ═══════════════════════════════════════════
// RENDER STUDENT LIST
// ═══════════════════════════════════════════
function renderList(){
  let list=allStudents.filter(s=>{
    const fok=filterMode==='all'||s.status===filterMode;
    const qok=!searchQ||s.name.toLowerCase().includes(searchQ)||s.roll.toLowerCase().includes(searchQ);
    return fok&&qok;
  });

  const el=document.getElementById('stuList');
  if(!list.length){
    el.innerHTML=`<div class="empty-list">🔍<br/>Koi student nahi mila<br/><span style="font-size:11px;font-family:'JetBrains Mono',monospace">Students login karenge tab dikhenge</span></div>`;
    return;
  }

  el.innerHTML=list.map(s=>{
    const {ic,av,badge}=statusStyle(s.status);
    return `<div class="stu-item${selRoll===s.roll?' sel':''}" onclick="showDetail('${s.roll}')">
      <div class="stu-avatar ${av}">${ic}</div>
      <div class="stu-info">
        <div class="stu-name">${escH(s.name)}</div>
        <div class="stu-roll">${escH(s.roll)}</div>
      </div>
      <div class="stu-badge ${badge}">${statusLabel(s.status)}</div>
    </div>`;
  }).join('');
}

function statusStyle(status){
  switch(status){
    case 'active':   return{ic:'🟢',av:'av-active',  badge:'badge-active'};
    case 'blocked':  return{ic:'🚫',av:'av-blocked', badge:'badge-blocked'};
    case 'submitted':return{ic:'✅',av:'av-submit',  badge:'badge-submit'};
    default:         return{ic:'⏸',av:'av-idle',    badge:'badge-idle'};
  }
}
function statusLabel(s){
  return{active:'Active',blocked:'Blocked',submitted:'Submitted'}[s]||'Idle';
}

// ═══════════════════════════════════════════
// SHOW DETAIL
// ═══════════════════════════════════════════
function showDetail(roll){
  selRoll=roll;
  const s=allStudents.find(x=>x.roll===roll);
  document.querySelectorAll('.stu-item').forEach(el=>el.classList.toggle('sel',el.onclick?.toString().includes(roll)));
  renderList();

  if(!s){document.getElementById('detailContent').style.display='none';document.getElementById('detailEmpty').style.display='flex';return;}

  document.getElementById('detailEmpty').style.display='none';
  document.getElementById('detailContent').style.display='block';

  const {ic,av}=statusStyle(s.status);
  const isBlocked=s.status==='blocked';
  const isSubmit=s.status==='submitted';

  const vlogHTML=s.vlog&&s.vlog.length
    ?s.vlog.map(v=>`<div class="vlog-row">• ${escH(v)}</div>`).join('')
    :'<div class="vlog-row" style="color:#666">Koi violation nahi hua</div>';

  const compHTML=s.components&&s.components.length
    ?s.components.map(c=>`<span class="ctag">${c.type}${c.pin?' (Pin '+c.pin+')':''}</span>`).join('')
    :'<span style="color:var(--muted);font-size:12px">Koi component nahi rakha</span>';

  const wireHTML=s.wires&&s.wires.length
    ?s.wires.map(w=>`<div class="wire-row"><div class="wr-dot" style="background:${pinCol(w.from?.label||'')}"></div>${escH(w.from?.label||'?')} → ${escH(w.to?.label||'?')}</div>`).join('')
    :'<div style="color:var(--muted);font-size:11px;padding:4px;font-family:\'JetBrains Mono\',monospace">Koi wire connection nahi</div>';

  document.getElementById('detailContent').innerHTML=`
    <div class="detail-header">
      <div class="stu-avatar ${av}" style="width:52px;height:52px;font-size:22px">${ic}</div>
      <div class="dh-info">
        <h2>${escH(s.name)}</h2>
        <p>${escH(s.roll)} &nbsp;·&nbsp; <span class="stu-badge ${statusStyle(s.status).badge}" style="font-size:10px">${statusLabel(s.status)}</span></p>
        ${s.loginTime?`<p style="font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:3px">Login: ${fmtTime(s.loginTime)}</p>`:''}
        ${s.submitTime?`<p style="font-size:10px;color:#7b1fa2;font-family:'JetBrains Mono',monospace">Submit: ${fmtTime(s.submitTime)}</p>`:''}
        ${s.blockTime?`<p style="font-size:10px;color:var(--red);font-family:'JetBrains Mono',monospace">Block hua: ${fmtTime(s.blockTime)}</p>`:''}
      </div>
    </div>

    <!-- Actions -->
    <div class="detail-actions">
      ${isBlocked?`<button class="dact-btn dact-unblock" onclick="unblockStudent('${s.roll}')">🔓 Unblock Karein</button>`:''}
      ${!isBlocked&&!isSubmit?`<button class="dact-btn dact-block" onclick="blockStudent('${s.roll}')">🚫 Block Karein</button>`:''}
      <button class="dact-btn dact-export" onclick="exportStudent('${s.roll}')">📥 Export TXT</button>
    </div>

    <!-- Info grid -->
    <div class="info-grid">
      <div class="info-box">
        <div class="ib-label">Violations</div>
        <div class="ib-val" style="color:${s.violations>=3?'var(--red)':s.violations>0?'var(--warn)':'var(--green)'}">${s.violations||0} / 3</div>
      </div>
      <div class="info-box">
        <div class="ib-label">Components</div>
        <div class="ib-val">${s.components?.length||0}</div>
      </div>
      <div class="info-box">
        <div class="ib-label">Wire Connections</div>
        <div class="ib-val">${s.wires?.length||0}</div>
      </div>
      <div class="info-box">
        <div class="ib-label">Code Lines</div>
        <div class="ib-val">${s.code?(s.code.split('\n').filter(l=>l.trim()).length):0}</div>
      </div>
    </div>

    <!-- Violations -->
    <div class="section">
      <div class="section-title">⚠ Violation Log (${s.violations||0})</div>
      <div class="vlog-list">${vlogHTML}</div>
    </div>

    <!-- Components -->
    <div class="section">
      <div class="section-title">🔌 Components Used</div>
      <div class="comp-tags">${compHTML}</div>
    </div>

    <!-- Wires -->
    <div class="section">
      <div class="section-title">🔗 Wire Connections</div>
      <div class="wire-list">${wireHTML}</div>
    </div>

    <!-- Code -->
    <div class="section">
      <div class="section-title">💻 Arduino Code</div>
      <div class="code-view">${escH(s.code||'// Koi code nahi likha abhi tak')}</div>
    </div>
  `;
}

// ═══════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════
function unblockStudent(roll){
  if(!confirm(`${roll} ko unblock karein? Woh dobara login kar sakenge.`)) return;
  removeBlock(roll);
  // Also set Firebase relogin flag
  if(db) {
    const key = roll.replace(/[^a-zA-Z0-9]/g,'_');
    db.ref('relogin/'+key).set(true);
    db.ref('blocked').orderByChild('roll').equalTo(roll).once('value', snap => {
      snap.forEach(child => child.ref.remove());
    });
  }
  toast('✅ '+roll+' unblock ho gaya!');
  loadData();
}

function blockStudent(roll){
  if(!confirm(`${roll} ko manually block karein?`)) return;
  const s=allStudents.find(x=>x.roll===roll);
  const blocked=getBlocked();
  blocked[roll.trim().toUpperCase()]={name:s?.name||roll,vlog:['Manual block by faculty'],time:new Date().toISOString(),violations:3};
  localStorage.setItem(BLOCK_KEY,JSON.stringify(blocked));
  toast('🚫 '+roll+' block kar diya gaya!');
  loadData();
}

function resetByRoll(){
  const roll=document.getElementById('resetRoll').value.trim().toUpperCase();
  if(!roll){toast('❌ Roll No daalen!');return;}
  removeBlock(roll);
  toast('✅ '+roll+' ka block remove kar diya!');
  document.getElementById('resetRoll').value='';
  loadData();
}

function exportStudent(roll){
  const s=allStudents.find(x=>x.roll===roll);if(!s) return;
  const txt=`IoT Lab Export
==============
Naam: ${s.name}
Roll: ${s.roll}
Status: ${statusLabel(s.status)}
Login: ${s.loginTime?fmtTime(s.loginTime):'N/A'}
Submit: ${s.submitTime?fmtTime(s.submitTime):'N/A'}
Violations: ${s.violations||0}/3

VIOLATION LOG:
${s.vlog?.join('\n')||'Koi violation nahi'}

COMPONENTS (${s.components?.length||0}):
${s.components?.map(c=>c.type+(c.pin?' Pin:'+c.pin:'')).join(', ')||'None'}

WIRE CONNECTIONS (${s.wires?.length||0}):
${s.wires?.map(w=>(w.from?.label||'?')+' → '+(w.to?.label||'?')).join('\n')||'None'}

ARDUINO CODE:
${s.code||'// No code'}
`;
  const a=document.createElement('a');
  a.href='data:text/plain;charset=utf-8,'+encodeURIComponent(txt);
  a.download=`${roll}_lab_export.txt`;
  a.click();
  toast('📥 Export ho gaya!');
}

// ═══════════════════════════════════════════
// FILTERS
// ═══════════════════════════════════════════
function setFilter(mode,el){
  filterMode=mode;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('on'));
  el.classList.add('on'); renderList();
}
function filterList(q){searchQ=q.toLowerCase();renderList();}

// ═══════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════
function fmtTime(t){
  try{const d=new Date(t);return d.toLocaleTimeString('hi-IN',{hour:'2-digit',minute:'2-digit'});}catch{return t||'—';}
}
function escH(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function pinCol(lbl){
  const l=lbl.toLowerCase();
  if(l.includes('vcc')||l==='+'||l.includes('5v')) return '#e53935';
  if(l.includes('gnd')||l==='-') return '#212121';
  if(l.includes('scl')||l.includes('sda')) return '#1565c0';
  return '#43a047';
}
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.display='block';
  clearTimeout(t._to);t._to=setTimeout(()=>t.style.display='none',3000);
}
</script>
